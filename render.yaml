# https://render.com/docs/blueprint-spec
# Set env in the dashboard or here: Telegram_API, SPOTIFY_CLIENT_ID, SPOTIFY_CLIENT_SECRET,
# SPOTIFY_REDIRECT_URI (must be https://<this-service-host>/callback)
services:
  - type: web
    name: spodify-telegram
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Python entrypoint avoids bash + CRLF (Windows) breaking Linux on Render.
    startCommand: python render_entry.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
